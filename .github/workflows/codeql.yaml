name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: c
          queries: security-extended
      - name: Configure
        run: cmake --preset linux-gcc -DZLIB_TEST=OFF
      - name: Build
        run: cmake --build --preset linux-gcc --config Release
      - uses: github/codeql-action/analyze@v4
